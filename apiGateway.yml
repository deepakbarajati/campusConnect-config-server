spring:
  cloud:
    gateway:
      routes:
        - id: authService
          uri: lb://AUTHSERVICE
          predicates:
            - Path=/api/v1/campusConnect/**
          filters:
            - StripPrefix=2

        - id: chatService
          uri: lb://CHATSERVICE
          predicates:
            - Path=/api/v1/campusConnect/**
          filters:
            - StripPrefix=2
            - name: AuthenticationFilter
            
        - id: aluminiService
          uri: lb://ALUMINISERVICE
          predicates:
            - Path=/api/v1/campusConnect/**
          filters:
            - StripPrefix=2
            - name: AuthenticationFilter
            
        - id: classroomService
          uri: lb://CLASSROOMSERVICE
          predicates:
            - Path=/api/v1/campusConnect/**
          filters:
            - StripPrefix=2
            - name: AuthenticationFilter
            
        - id: forumService
          uri: lb://FORUMSERVICE
          predicates:
            - Path=/api/v1/campusConnect/**
          filters:
            - StripPrefix=2
            - name: AuthenticationFilter

        - id: gamificationService
          uri: lb://GAMIFICATIONSERVICE
          predicates:
            - Path=/api/v1/campusConnect/**
          filters:
            - StripPrefix=2
            - name: AuthenticationFilter
            
        - id: opportunityService
          uri: lb://OPPORTUNITYSERVICE
          predicates:
            - Path=/api/v1/campusConnect/**
          filters:
            - StripPrefix=2
            - name: AuthenticationFilter

server:
  port: 8080

